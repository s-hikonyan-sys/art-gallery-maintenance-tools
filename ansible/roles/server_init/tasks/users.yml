---
# アプリケーション実行ユーザーの作成
# SSH 接続は ssh-admin を使用し、app_user はアプリ実行専用。

- name: Create app user group
  ansible.builtin.group:
    name: "{{ app_user }}"
    state: present
  tags:
    - init-users

- name: Create app user
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_user }}"
    groups: wheel
    append: yes
    shell: /bin/bash
    create_home: yes
    state: present
    comment: "art-gallery deployment user"
  tags:
    - init-users

- name: Create .ssh directory for app user
  ansible.builtin.file:
    path: "/home/{{ app_user }}/.ssh"
    state: directory
    mode: '0700'
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
  tags:
    - init-users

- name: Allow app user to sudo without password (required for Ansible become)
  ansible.builtin.copy:
    content: "{{ app_user }} ALL=(ALL) NOPASSWD:ALL\n"
    dest: "/etc/sudoers.d/{{ app_user }}"
    mode: '0440'
    validate: 'visudo -cf %s'
  tags:
    - init-users

# SSH の強制（root 禁止・パスワード認証禁止・AllowUsers）は ssh_lockdown.yml で
# ロールの最後に適用する（適用後は alma の SSH ログイン不可）。
