---
# GHCR (GitHub Container Registry) の認証設定
# Docker pull 時に認証が必要なため、app_user の docker login 設定を行う

- name: Create Docker config directory for app user
  ansible.builtin.file:
    path: "/home/{{ app_user }}/.docker"
    state: directory
    mode: '0700'
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
  tags:
    - init-ghcr

- name: Login to GHCR as app user
  ansible.builtin.command:
    argv:
      - docker
      - login
      - "{{ ghcr_registry }}"
      - --username
      - "{{ ghcr_username | mandatory('ghcr_username must be set in server_init_vars.yml') }}"
      - --password-stdin
    stdin: "{{ ghcr_token | mandatory('ghcr_token must be set in server_init_vars.yml') }}"
  become: yes
  environment:
    DOCKER_CONFIG: "/home/{{ app_user }}/.docker"
  no_log: true
  changed_when: false
  register: ghcr_login_result
  failed_when: ghcr_login_result.rc != 0
  tags:
    - init-ghcr

- name: GHCR login success
  ansible.builtin.debug:
    msg: "GHCR 認証完了: {{ ghcr_registry }}"
  tags:
    - init-ghcr
