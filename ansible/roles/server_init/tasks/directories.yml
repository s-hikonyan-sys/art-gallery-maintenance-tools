---
# デプロイメントディレクトリの作成
# art-gallery-release-tools の Ansible が期待するディレクトリ構成を作成する
# deployment_dir: /opt/art-gallery

- name: Create deployment root directory
  ansible.builtin.file:
    path: "{{ deployment_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
  tags:
    - init-directories

- name: Create deployment subdirectories
  ansible.builtin.file:
    path: "{{ deployment_dir }}/{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
  loop: "{{ deployment_subdirs }}"
  tags:
    - init-directories

- name: Check current_versions.yml exists
  ansible.builtin.stat:
    path: "{{ deployment_dir }}/current_versions.yml"
  register: current_versions_stat
  tags:
    - init-directories

- name: Initialize current_versions.yml for release-tools deploy bootstrap
  ansible.builtin.copy:
    content: |
      secrets_version: "{{ initial_release_version | mandatory('initial_release_version must be set in server_init_vars.yml (existing GHCR tag)') }}"
      postgres_version: "{{ initial_release_version | mandatory('initial_release_version must be set in server_init_vars.yml (existing GHCR tag)') }}"
      backend_version: "{{ initial_release_version | mandatory('initial_release_version must be set in server_init_vars.yml (existing GHCR tag)') }}"
      nginx_version: "{{ initial_release_version | mandatory('initial_release_version must be set in server_init_vars.yml (existing GHCR tag)') }}"
    dest: "{{ deployment_dir }}/current_versions.yml"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0644"
  when: not current_versions_stat.stat.exists
  tags:
    - init-directories

- name: Create SNS feed public directory
  ansible.builtin.file:
    path: "{{ social_feed_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
  tags:
    - init-directories

- name: Create backend contact queue directory
  ansible.builtin.file:
    path: "{{ deployment_dir }}/src/{{ backend_repo_name }}/contact_queue"
    state: directory
    mode: '0755'
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
  tags:
    - init-directories

# nginx コンテナは root 起動のためログファイル UID はコンテナ内 nginx ユーザーになる。
# ディレクトリは artgallery 所有 + setgid で artgallery が管理可能にする。
- name: Ensure nginx log directory is group-writable with setgid
  ansible.builtin.file:
    path: "{{ deployment_dir }}/logs/nginx"
    state: directory
    mode: '2775'
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
  tags:
    - init-directories

- name: Verify directory structure
  ansible.builtin.find:
    paths: "{{ deployment_dir }}"
    file_type: directory
    recurse: no
  register: created_dirs
  tags:
    - init-directories

- name: Show created directories
  ansible.builtin.debug:
    msg: "Created: {{ created_dirs.files | map(attribute='path') | list | sort }}"
  tags:
    - init-directories
