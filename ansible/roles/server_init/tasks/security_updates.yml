---
# セキュリティアップデートとベースパッケージのインストール
# AlmaLinux 10 (dnf)

- name: Apply all security updates
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_only: yes
    security: yes
  tags:
    - init-security

- name: Install required base packages
  ansible.builtin.dnf:
    name:
      - curl
      - wget
      - git
      - tar
      - unzip
      - ca-certificates
      - gnupg2
      - python3
      - python3-pip
      - policycoreutils-python-utils
    state: present
  tags:
    - init-security

- name: Enable EPEL repository
  ansible.builtin.dnf:
    name: epel-release
    state: present
  tags:
    - init-security
