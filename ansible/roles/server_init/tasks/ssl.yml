---
# Let's Encrypt SSL 証明書の取得（certbot）
# AlmaLinux 10: snapd 経由でインストール
#
# 前提: ドメインの DNS が VPS の IP アドレスを向いていること

- name: Install snapd
  ansible.builtin.dnf:
    name: snapd
    state: present
  tags:
    - init-ssl

- name: Enable snapd socket
  ansible.builtin.systemd:
    name: snapd.socket
    enabled: yes
    state: started
  tags:
    - init-ssl

- name: Create snapd symlink for classic snaps
  ansible.builtin.file:
    src: /var/lib/snapd/snap
    dest: /snap
    state: link
  tags:
    - init-ssl

- name: Wait for snapd to be ready
  ansible.builtin.command: snap wait system seed.loaded
  changed_when: false
  tags:
    - init-ssl

- name: Install certbot via snap
  community.general.snap:
    name: certbot
    classic: yes
    state: present
  tags:
    - init-ssl

- name: Create certbot symlink
  ansible.builtin.file:
    src: /snap/bin/certbot
    dest: /usr/bin/certbot
    state: link
    force: yes
  tags:
    - init-ssl

- name: Check if SSL certificate already exists
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ domain_name }}/fullchain.pem"
  register: ssl_cert_stat
  tags:
    - init-ssl

- name: Obtain SSL certificate (standalone mode)
  ansible.builtin.command: >
    certbot certonly --standalone
    --non-interactive
    --agree-tos
    --email {{ certbot_email | mandatory('certbot_email must be set in server_init_vars.yml') }}
    -d {{ domain_name }}
  when: not ssl_cert_stat.stat.exists
  tags:
    - init-ssl

- name: Verify certificate was obtained
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ domain_name }}/fullchain.pem"
  register: ssl_cert_verify
  failed_when: not ssl_cert_verify.stat.exists
  changed_when: false
  tags:
    - init-ssl

- name: Set up certbot auto-renewal timer
  ansible.builtin.systemd:
    name: snap.certbot.renew.timer
    enabled: yes
    state: started
  tags:
    - init-ssl

- name: Show SSL certificate info
  ansible.builtin.command: certbot certificates
  register: cert_info
  changed_when: false
  tags:
    - init-ssl

- name: Print certificate info
  ansible.builtin.debug:
    msg: "{{ cert_info.stdout_lines }}"
  tags:
    - init-ssl
