---
# server_init ロール エントリポイント
# 各タスクはタグで個別実行できる

- name: Apply security updates
  ansible.builtin.include_tasks: security_updates.yml
  tags: always

- name: Create SSH admin user (ssh-admin)
  ansible.builtin.include_tasks: admin_ssh.yml
  tags:
    - init-users
    - init-admin-ssh

- name: Setup app user
  ansible.builtin.include_tasks: users.yml
  tags:
    - init-users

- name: Install and configure Docker
  ansible.builtin.include_tasks: docker.yml
  tags:
    - init-docker

- name: Configure firewall
  ansible.builtin.include_tasks: firewall.yml
  tags:
    - init-firewall

- name: Create deployment directories
  ansible.builtin.include_tasks: directories.yml
  tags:
    - init-directories

- name: Setup SSL certificate (Let's Encrypt)
  ansible.builtin.include_tasks: ssl.yml
  tags:
    - init-ssl

- name: Configure GHCR authentication
  ansible.builtin.include_tasks: ghcr.yml
  tags:
    - init-ghcr

- name: Install and configure Fail2ban (SSH brute-force protection)
  ansible.builtin.include_tasks: fail2ban.yml
  tags:
    - init-fail2ban

# 最後に実行: AllowUsers により alma の SSH が不可になる（既存 Ansible セッションは通常維持）
# --tags 部分実行時は init-ssh-lockdown を含めない限りスキップされる（admin 未作成でのロックアウト防止）
- name: Lock down SSH (root / password auth / AllowUsers)
  ansible.builtin.include_tasks: ssh_lockdown.yml
  tags:
    - init-ssh-lockdown
