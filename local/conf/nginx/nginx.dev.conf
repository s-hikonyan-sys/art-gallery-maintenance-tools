# ローカル開発用 Nginx 設定（SSL なし）
# nginx コンテナ（--profile nginx）起動時に使用される
# フルスタック確認（シナリオA）用

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    upstream backend {
        # コンテナ名（docker-compose.local.yml の container_name: art-gallery-dev-api）
        server art-gallery-dev-api:8080;
    }

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # API リクエストをバックエンドコンテナに転送
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # フロントエンド SPA（ビルド済み静的ファイル）
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
